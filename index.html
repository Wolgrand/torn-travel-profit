<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torn City Travel Profit Tracker</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --card-bg: #2a2a35;
            --accent-color: #3b82f6;
            --success-color: #10b981;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #3f3f46;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 1.8rem; }

        .api-input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            background-color: #111115;
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            width: 250px;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button:disabled { background-color: var(--border-color); cursor: not-allowed; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
        }

        .card-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .card-value {
            font-size: 1.75rem;
            font-weight: bold;
        }

        .profit-positive { color: var(--success-color); }

        .table-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #23232d;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        tr:last-child td { border-bottom: none; }

        .status-message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
        .error { background-color: #7f1d1d; border: 1px solid #f87171; }
        .info { background-color: #1e3a8a; border: 1px solid #60a5fa; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>✈️ Torn Travel Profits</h1>
        <div class="api-input-group">
            <input type="text" id="apiKeyInput" placeholder="Enter Torn API Key" />
            <button id="syncBtn" onclick="syncData()">Sync Data</button>
        </div>
    </header>

    <div id="statusBox" class="status-message"></div>

    <div class="stats-grid">
        <div class="card">
            <div class="card-title">Daily profit (24h)</div>
            <div id="dailyProfit" class="card-value profit-positive">$0</div>
        </div>
        <div class="card">
            <div class="card-title">Total Travel Profit</div>
            <div id="totalProfit" class="card-value profit-positive">$0</div>
        </div>
        <div class="card">
            <div class="card-title">Last Updated</div>
            <div id="lastUpdated" style="font-size: 1.1rem; margin-top: 8px;">Never</div>
        </div>
    </div>

    <h2>Itemized Breakdown</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Item Name (ID)</th>
                    <th>Qty</th>
                    <th>Buy Price</th>
                    <th>Current Market</th>
                    <th>Net Profit</th>
                </tr>
            </thead>
            <tbody id="logTableBody">
                <tr>
                    <td colspan="6" style="text-align: center; color: var(--text-muted);">No data synced yet. Enter your API Key and hit Sync.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const TORN_BASE_URL = 'https://api.torn.com';

    // --- INITIALIZATION ---
    window.addEventListener('DOMContentLoaded', () => {
        const savedKey = localStorage.getItem('torn_api_key');
        if (savedKey) {
            document.getElementById('apiKeyInput').value = savedKey;
            renderDashboard(); // Render cached state on load
        }
    });

    // --- API CORE MODULE ---
    async function handleTornFetch(url) {
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
            
            const data = await response.json();
            if (data.error) {
                const { code, error: errorMsg } = data.error;
                if ([2, 3, 4].includes(code)) throw new Error(`API Key Error: ${errorMsg}`);
                if (code === 5) throw new Error(`Rate Limit Hit (Max 100 req/min): ${errorMsg}`);
                throw new Error(`API Error [${code}]: ${errorMsg}`);
            }
            return data;
        } catch (error) {
            console.error("Fetch Exception:", error.message);
            throw error;
        }
    }

    async function getTravelLogs(apiKey) {
        const url = `${TORN_BASE_URL}/user/?selections=log&key=${apiKey}`;
        const data = await handleTornFetch(url);
        const logs = data.log || {};
        
        return Object.values(logs)
            .filter(log => log.category === 'Travel' && log.title === 'Item abroad buy')
            .map(log => ({
                itemId: log.data.item,
                quantity: log.data.quantity,
                buyPrice: log.data.cost_each,
                totalCost: log.data.cost_total,
                timestamp: log.timestamp
            }));
    }

    async function getMarketPrices(apiKey, uniqueItemIds) {
    const priceMap = {};
    
    for (const itemId of uniqueItemIds) {
        // Fix: Explicitly declare ?selections=itemmarket for the specific item id
        const url = `https://api.torn.com/v2/market/${itemId}?selections=itemmarket&key=${apiKey}`;
        try {
            const data = await handleTornFetch(url);
            
            // In API v2, the target array inside itemmarket is called 'listings'
            const listings = data.itemmarket?.listings || [];
            
            // Extract the cheapest item price from the first listing
            priceMap[itemId] = listings.length > 0 ? listings[0].price : 0; 
        } catch (error) {
            console.warn(`Failed mapping item ${itemId} using API v2, skipping.`);
            priceMap[itemId] = 0;
        }
    }
    return priceMap;
}

    async function getItemNamesMap(apiKey) {
        const CACHE_KEY = 'torn_items_cache';
        const CACHE_TIME_KEY = 'torn_items_cache_time';
        const THREE_DAYS = 3 * 24 * 60 * 60 * 1000;
        
        const cachedData = localStorage.getItem(CACHE_KEY);
        const cachedTime = localStorage.getItem(CACHE_TIME_KEY);
        
        if (cachedData && cachedTime && (Date.now() - cachedTime < THREE_DAYS)) {
            return JSON.parse(cachedData);
        }
        
        const url = `${TORN_BASE_URL}/torn/?selections=items&key=${apiKey}`;
        const data = await handleTornFetch(url);
        const items = data.items || {};
        const nameMap = {};
        
        Object.keys(items).forEach(id => { nameMap[id] = items[id].name; });
        
        localStorage.setItem(CACHE_KEY, JSON.stringify(nameMap));
        localStorage.setItem(CACHE_TIME_KEY, Date.now().toString());
        return nameMap;
    }

    // --- ANALYTICS LOGIC MODULE ---
    function calculateProfitAnalytics(processedLogs, marketPrices) {
        const nowInSeconds = Math.floor(Date.now() / 1000);
        const twentyFourHoursAgo = nowInSeconds - (24 * 60 * 60);
        
        let totalProfit = 0;
        let dailyProfit = 0;
        
        const detailedLogs = processedLogs.map(log => {
            const currentMarketPrice = marketPrices[log.itemId] || 0;
            const individualProfit = (currentMarketPrice - log.buyPrice) * log.quantity;
            
            totalProfit += individualProfit;
            if (log.timestamp >= twentyFourHoursAgo) {
                dailyProfit += individualProfit;
            }
            
            return { ...log, currentMarketPrice, profit: individualProfit };
        });
        
        return { detailedLogs, dailyProfit, totalProfit };
    }

    // --- UI ORCHESTRATION ---
    function showStatus(msg, type = 'info') {
        const box = document.getElementById('statusBox');
        box.className = `status-message ${type}`;
        box.innerText = msg;
        box.style.display = 'block';
    }

    function clearStatus() {
        document.getElementById('statusBox').style.display = 'none';
    }

    function formatMoney(amount) {
        return '$' + amount.toLocaleString();
    }

    function renderDashboard() {
        const cachedData = localStorage.getItem('torn_travel_profit_data');
        if (!cachedData) return;

        const data = JSON.parse(cachedData);
        document.getElementById('dailyProfit').innerText = formatMoney(data.dailyProfit);
        document.getElementById('totalProfit').innerText = formatMoney(data.totalProfit);
        document.getElementById('lastUpdated').innerText = new Date(data.lastUpdated).toLocaleTimeString();

        const tbody = document.getElementById('logTableBody');
        if (data.logs.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align: center;">No valid travel logs found.</td></tr>`;
            return;
        }

        tbody.innerHTML = data.logs.map(log => {
            const readableDate = new Date(log.timestamp * 1000).toLocaleString();
            return `
                <tr>
                    <td>${readableDate}</td>
                    <td><strong>${log.itemName}</strong> <span style="color:var(--text-muted); font-size:0.8rem;">(${log.itemId})</span></td>
                    <td>${log.quantity}</td>
                    <td>${formatMoney(log.buyPrice)}</td>
                    <td>${formatMoney(log.currentMarketPrice)}</td>
                    <td class="profit-positive">${formatMoney(log.profit)}</td>
                </tr>
            `;
        }).join('');
    }

    async function syncData() {
        const apiKey = document.getElementById('apiKeyInput').value.trim();
        const syncBtn = document.getElementById('syncBtn');

        if (!apiKey) {
            showStatus("Please enter an API key first.", "error");
            return;
        }

        localStorage.setItem('torn_api_key', apiKey);
        syncBtn.disabled = true;
        showStatus("Fetching travel logs & updating live market costs...", "info");

        try {
            const travelLogs = await getTravelLogs(apiKey);
            const uniqueItemIds = [...new Set(travelLogs.map(log => log.itemId))];
            
            const itemNames = await getItemNamesMap(apiKey);
            const marketPrices = await getMarketPrices(apiKey, uniqueItemIds);
            
            const analytics = calculateProfitAnalytics(travelLogs, marketPrices);
            
            const uiReadyLogs = analytics.detailedLogs.map(log => ({
                ...log,
                itemName: itemNames[log.itemId] || `Item #${log.itemId}`
            }));

            const payload = {
                totalProfit: analytics.totalProfit,
                dailyProfit: analytics.dailyProfit,
                logs: uiReadyLogs,
                lastUpdated: new Date().toISOString()
            };

            localStorage.setItem('torn_travel_profit_data', JSON.stringify(payload));
            renderDashboard();
            clearStatus();
        } catch (error) {
            showStatus(error.message, "error");
        } finally {
            syncBtn.disabled = false;
        }
    }
</script>

</body>
</html>
